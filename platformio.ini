;[env:esp32-s3-devkitc-1]
;platform = espressif32
;board = esp32-s3-devkitc-1
;framework = arduino

;upload_speed = 921600
;monitor_speed = 115200

[env:freenove_esp32_s3_wroom]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino

upload_speed = 921600
monitor_speed = 115200

board_upload.flash_size = 16MB ; Tu módulo tiene 16 MB reales → esto evita errores de arranque.
board_build.partitions = default_16MB.csv
board_build.psram = enabled ; Tu módulo tiene PSRAM OPI → la cámara la necesita.

build_flags = ; Activa USB CDC y PSRAM correctamente.
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    adafruit/Adafruit NeoPixel@^1.15.4
    esp32-camera
